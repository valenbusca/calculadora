<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador Profesional de Traslados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h2>Presupuesto Mensual <span id="currentYear"></span></h2>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <div class="input-row">
                    <div class="input-group">
                        <label>Mes a Liquidar</label>
                        <select id="mes" onchange="calcular()">
                            <option value="0">Enero</option><option value="1">Febrero</option>
                            <option value="2">Marzo</option><option value="3" selected>Abril</option>
                            <option value="4">Mayo</option><option value="5">Junio</option>
                            <option value="6">Julio</option><option value="7">Agosto</option>
                            <option value="8">Septiembre</option><option value="9">Octubre</option>
                            <option value="10">Noviembre</option><option value="11">Diciembre</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Vehículo</label>
                        <select id="auto" onchange="calcular()">
                            <option value="12" selected>Celta (12 km/l)</option>
                            <option value="10">Renault 9 (10 km/l)</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Kms por viaje</label>
                        <input type="number" id="kms" value="4.2" step="0.1" oninput="calcular()">
                    </div>
                    <div class="input-group">
                        <label>Minutos viaje</label>
                        <input type="number" id="minutos" value="20" oninput="calcular()">
                    </div>
                    <div class="input-group">
                        <label>Viajes x día</label>
                        <input type="number" id="viajesDia" value="2" oninput="calcular()">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Precio Nafta ($)</label>
                        <input type="number" id="nafta" value="2200" oninput="calcular()">
                    </div>
                    <div class="input-group">
                        <label>Valor Hora ($)</label>
                        <input type="number" id="valorHora" value="10000" oninput="calcular()">
                    </div>
                </div>
            </div>

            <div class="results-panel">
                <div class="stat">
                    <span class="label">Días Hábiles</span>
                    <span class="value" id="resDias">-</span>
                </div>
                <div class="stat">
                    <span class="label">Total Viajes</span>
                    <span class="value" id="resViajesTotales">-</span>
                </div>
                <div class="total-box">
                    <span class="label">TOTAL A COBRAR</span>
                    <span class="total-amount" id="resTotal">$0</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
